name: Activity card
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "README.md"
      - "scripts/render-activity-card.mjs"
      - ".github/workflows/metrics.yml"

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Render activity card
        run: node scripts/render-activity-card.mjs
        env:
          PROFILE_LOGIN: majiayu000
          PROFILE_TOKEN: ${{ secrets.METRICS_TOKEN || github.token }}

      - name: Commit activity refresh
        run: |
          if git diff --quiet -- assets/activity-card.svg; then
            echo "Activity card unchanged."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/activity-card.svg
          git commit -m "chore: refresh profile activity card"
          git push
