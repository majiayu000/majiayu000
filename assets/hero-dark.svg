<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">lifcc — AI agent infrastructure control plane</title>
  <desc id="desc">A neon industrial control panel showing lifcc's coding-agent infrastructure loop.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#07131f"/>
      <stop offset="0.55" stop-color="#050a12"/>
      <stop offset="1" stop-color="#120914"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#00e7ff"/>
      <stop offset="0.52" stop-color="#00e7ff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ff3d9a"/>
    </linearGradient>
    <radialGradient id="reactor">
      <stop stop-color="#d9fbff"/>
      <stop offset="0.18" stop-color="#00e7ff"/>
      <stop offset="0.55" stop-color="#0c5d78" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#07131f" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#1d4051" stroke-width="0.6" opacity="0.38"/>
      <circle cx="0" cy="0" r="1" fill="#00e7ff" opacity="0.22"/>
    </pattern>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="screen"><rect x="16" y="16" width="1168" height="328" rx="16"/></clipPath>
  </defs>
  <style>
    text { font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; }
    .muted { fill: #6f8798; }
    .cyan { fill: #00e7ff; }
    .magenta { fill: #ff3d9a; }
    .wire { stroke-dasharray: 7 9; animation: flow 5s linear infinite; }
    .blink { animation: blink 2.4s steps(1) infinite; }
    .pulse { transform-box: fill-box; transform-origin: center; animation: pulse 2.8s ease-in-out infinite; }
    .scan { animation: scan 7s linear infinite; }
    .node { animation: node 6.4s ease-in-out infinite; }
    .node:nth-of-type(2) { animation-delay: .25s; }
    .node:nth-of-type(3) { animation-delay: .5s; }
    .node:nth-of-type(4) { animation-delay: .75s; }
    .node:nth-of-type(5) { animation-delay: 1s; }
    .node:nth-of-type(6) { animation-delay: 1.25s; }
    .node:nth-of-type(7) { animation-delay: 1.5s; }
    .node:nth-of-type(8) { animation-delay: 1.75s; }
    @keyframes flow { to { stroke-dashoffset: -64; } }
    @keyframes blink { 0%, 76% { opacity: 1; } 77%, 84% { opacity: .2; } 85% { opacity: 1; } }
    @keyframes pulse { 0%, 100% { transform: scale(.92); opacity: .66; } 50% { transform: scale(1.08); opacity: 1; } }
    @keyframes scan { from { transform: translateX(-260px); } to { transform: translateX(1420px); } }
    @keyframes node { 0%, 42%, 100% { opacity: .58; } 12%, 30% { opacity: 1; } }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <rect width="1200" height="360" fill="#02050a"/>
  <rect x="16" y="16" width="1168" height="328" rx="16" fill="url(#panel)" stroke="#204151"/>
  <g clip-path="url(#screen)">
    <rect x="16" y="16" width="1168" height="328" fill="url(#grid)"/>
    <path d="M690 16 1184 16 1184 344 930 344Z" fill="#ff3d9a" opacity="0.025"/>
    <path d="M16 284 760 16H900L156 344H16Z" fill="#00e7ff" opacity="0.022"/>
    <g class="scan" opacity="0.16">
      <rect x="-120" y="16" width="90" height="328" fill="#00e7ff"/>
      <rect x="-30" y="16" width="90" height="328" fill="url(#edge)" opacity="0.24"/>
    </g>
  </g>
  <rect x="16.5" y="16.5" width="1167" height="327" rx="15.5" fill="none" stroke="url(#edge)" opacity="0.75"/>
  <path d="M16 62H1184" stroke="#173241"/>

  <circle cx="42" cy="39" r="4" fill="#ff5364"/>
  <circle cx="59" cy="39" r="4" fill="#ffbd2e"/>
  <circle cx="76" cy="39" r="4" fill="#2aca44"/>
  <text x="98" y="43" fill="#7892a4" font-size="12" letter-spacing="2">LIFCC / CONTROL_PLANE</text>
  <circle cx="1040" cy="39" r="4" fill="#00e7ff" class="blink" filter="url(#glow)"/>
  <text x="1052" y="43" fill="#9db2bf" font-size="11" letter-spacing="1.4">SYSTEM ONLINE</text>

  <text x="56" y="112" class="cyan" font-size="13" letter-spacing="4">// BUILDING THE INFRASTRUCTURE LAYER</text>
  <text x="54" y="166" fill="#e8f7ff" font-size="50" font-weight="800" letter-spacing="-2">AI AGENT</text>
  <text x="54" y="216" fill="#e8f7ff" font-size="50" font-weight="800" letter-spacing="-2">INFRASTRUCTURE</text>
  <text x="58" y="244" class="muted" font-size="13" letter-spacing="1.5">RUST SYSTEMS · CLAUDE CODE · CODEX · OPEN SOURCE</text>

  <g transform="translate(1008 157)">
    <circle r="91" fill="none" stroke="#16394a" stroke-width="1"/>
    <circle r="68" fill="none" stroke="#00e7ff" stroke-width="1.5" opacity="0.52" stroke-dasharray="9 12" class="wire"/>
    <circle r="46" fill="url(#reactor)" class="pulse"/>
    <circle r="18" fill="#06121c" stroke="#b7f9ff" stroke-width="1.5" filter="url(#glow)"/>
    <circle r="5" fill="#ffffff" filter="url(#glow)"/>
    <g fill="#07131f" stroke="#00e7ff">
      <circle cx="0" cy="-91" r="6"/><circle cx="79" cy="-45" r="6"/>
      <circle cx="79" cy="45" r="6"/><circle cx="0" cy="91" r="6"/>
      <circle cx="-79" cy="45" r="6"/><circle cx="-79" cy="-45" r="6"/>
    </g>
    <g stroke="#00e7ff" stroke-width="1" opacity="0.5">
      <path d="M0-85 0-20M74-42 17-10M74 42 17 10M0 85V20M-74 42-17 10M-74-42-17-10"/>
    </g>
    <text x="-34" y="119" fill="#6f8798" font-size="10" letter-spacing="2">CLOSED LOOP</text>
  </g>

  <text x="57" y="281" class="magenta" font-size="10" letter-spacing="3">EXECUTION PATH / 08 ACTIVE LAYERS</text>
  <path d="M68 311H1134" stroke="#00e7ff" stroke-width="1" opacity="0.32" class="wire"/>
  <g font-size="10" text-anchor="middle" letter-spacing="0.7">
    <g class="node"><rect x="38" y="294" width="126" height="34" rx="4" fill="#07131f" stroke="#1c6174"/><circle cx="53" cy="311" r="3" fill="#00e7ff"/><text x="101" y="315" fill="#aeeef4">DIRECT</text></g>
    <g class="node"><rect x="180" y="294" width="126" height="34" rx="4" fill="#07131f" stroke="#1c6174"/><circle cx="195" cy="311" r="3" fill="#00e7ff"/><text x="243" y="315" fill="#aeeef4">EXTEND</text></g>
    <g class="node"><rect x="322" y="294" width="126" height="34" rx="4" fill="#07131f" stroke="#1c6174"/><circle cx="337" cy="311" r="3" fill="#00e7ff"/><text x="385" y="315" fill="#aeeef4">TRUST</text></g>
    <g class="node"><rect x="464" y="294" width="126" height="34" rx="4" fill="#07131f" stroke="#1c6174"/><circle cx="479" cy="311" r="3" fill="#00e7ff"/><text x="527" y="315" fill="#aeeef4">REMEMBER</text></g>
    <g class="node"><rect x="606" y="294" width="126" height="34" rx="4" fill="#120914" stroke="#7a2756"/><circle cx="621" cy="311" r="3" fill="#ff3d9a"/><text x="669" y="315" fill="#ffc1df" font-size="9">ORCHESTRATE</text></g>
    <g class="node"><rect x="748" y="294" width="126" height="34" rx="4" fill="#120914" stroke="#7a2756"/><circle cx="763" cy="311" r="3" fill="#ff3d9a"/><text x="811" y="315" fill="#ffc1df">ROUTE</text></g>
    <g class="node"><rect x="890" y="294" width="126" height="34" rx="4" fill="#120914" stroke="#7a2756"/><circle cx="905" cy="311" r="3" fill="#ff3d9a"/><text x="953" y="315" fill="#ffc1df">GOVERN</text></g>
    <g class="node"><rect x="1032" y="294" width="126" height="34" rx="4" fill="#120914" stroke="#7a2756"/><circle cx="1047" cy="311" r="3" fill="#ff3d9a"/><text x="1095" y="315" fill="#ffc1df">KEEP</text></g>
  </g>
</svg>
